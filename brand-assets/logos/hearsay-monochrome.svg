<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="clayShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Speech bubble + pencil hybrid icon (monochrome) -->
  <g id="icon" transform="translate(20, 20)">
    <path d="M 40 15 C 40 7 33 0 25 0 L 15 0 C 7 0 0 7 0 15 L 0 35 C 0 43 7 50 15 50 L 18 50 L 25 60 L 28 50 L 25 50 C 33 50 40 43 40 35 Z"
          fill="#333333"
          filter="url(#clayShadow)"
          stroke="#1A1A1A"
          stroke-width="3"/>

    <path d="M 15 20 L 30 35 M 30 35 L 28 38 L 25 36 Z"
          stroke="#FFF"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <circle cx="30" cy="35" r="3" fill="#666666"/>
  </g>

  <!-- Hearsay wordmark (monochrome) -->
  <text x="80" y="55"
        font-family="Fredoka, sans-serif"
        font-size="42"
        font-weight="700"
        fill="#333333"
        filter="url(#clayShadow)">Hearsay</text>

  <!-- Rygtet Går subtitle -->
  <text x="80" y="80"
        font-family="Fredoka, sans-serif"
        font-size="18"
        font-weight="500"
        fill="#666666">Rygtet Går</text>
</svg>
